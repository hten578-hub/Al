<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8-Puzzle Solver - A* Algorithm</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .puzzle-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 30px auto;
            max-width: 350px;
            background: #ecf0f1;
            padding: 15px;
            border-radius: 15px;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.1);
        }

        .tile {
            aspect-ratio: 1;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            font-size: 2.5rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .tile:hover:not(.empty) {
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .tile.empty {
            background: #bdc3c7;
            cursor: default;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .btn-secondary {
            background: #3498db;
            color: white;
        }

        .btn-secondary:hover {
            background: #2980b9;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #2ecc71;
            color: white;
        }

        .btn-success:hover {
            background: #27ae60;
        }

        .info-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1rem;
        }

        .info-label {
            font-weight: 600;
            color: #2c3e50;
        }

        .info-value {
            color: #667eea;
            font-weight: bold;
        }

        .solution-steps {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .solution-steps h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .step {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 4px solid #3498db;
        }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: 600;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }

        .message.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 2px solid #bee5eb;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧩 8-Puzzle Solver</h1>
        <p class="subtitle">Giải bằng thuật toán A* với Manhattan Heuristic</p>

        <div class="puzzle-board" id="puzzleBoard"></div>

        <div class="controls">
            <button class="btn-primary" onclick="solvePuzzle()">🚀 Giải Puzzle</button>
            <button class="btn-secondary" onclick="shufflePuzzle()">🔀 Xáo trộn</button>
            <button class="btn-success" onclick="resetPuzzle()">🔄 Reset</button>
        </div>

        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Số bước đã đi:</span>
                <span class="info-value" id="moveCount">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Manhattan Distance:</span>
                <span class="info-value" id="heuristic">0</span>
            </div>
            <div class="info-item">
                <span class="info-label">Trạng thái:</span>
                <span class="info-value" id="status">Sẵn sàng</span>
            </div>
        </div>

        <div id="messageBox"></div>
        <div id="solutionBox" class="hidden"></div>
    </div>

    <script>
        let board = [1, 2, 3, 4, 5, 6, 7, 8, 0];
        let moveCount = 0;
        const goalState = [1, 2, 3, 4, 5, 6, 7, 8, 0];

        function initBoard() {
            const boardElement = document.getElementById('puzzleBoard');
            boardElement.innerHTML = '';
            
            board.forEach((num, index) => {
                const tile = document.createElement('button');
                tile.className = num === 0 ? 'tile empty' : 'tile';
                tile.textContent = num === 0 ? '' : num;
                tile.onclick = () => moveTile(index);
                boardElement.appendChild(tile);
            });
            
            updateInfo();
        }

        function moveTile(index) {
            const emptyIndex = board.indexOf(0);
            const row = Math.floor(index / 3);
            const col = index % 3;
            const emptyRow = Math.floor(emptyIndex / 3);
            const emptyCol = emptyIndex % 3;
            
            // Check if adjacent
            if ((Math.abs(row - emptyRow) === 1 && col === emptyCol) ||
                (Math.abs(col - emptyCol) === 1 && row === emptyRow)) {
                [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
                moveCount++;
                initBoard();
                
                if (isSolved()) {
                    showMessage('success', `🎉 Chúc mừng! Bạn đã giải được puzzle trong ${moveCount} bước!`);
                    document.getElementById('status').textContent = 'Hoàn thành!';
                }
            }
        }

        function calculateManhattan() {
            let distance = 0;
            for (let i = 0; i < 9; i++) {
                if (board[i] !== 0) {
                    const targetIndex = board[i] - 1;
                    const currentRow = Math.floor(i / 3);
                    const currentCol = i % 3;
                    const targetRow = Math.floor(targetIndex / 3);
                    const targetCol = targetIndex % 3;
                    distance += Math.abs(currentRow - targetRow) + Math.abs(currentCol - targetCol);
                }
            }
            return distance;
        }

        function isSolved() {
            return board.every((val, idx) => val === goalState[idx]);
        }

        function updateInfo() {
            document.getElementById('moveCount').textContent = moveCount;
            document.getElementById('heuristic').textContent = calculateManhattan();
        }

        function shufflePuzzle() {
            // Shuffle with solvable configuration
            for (let i = 0; i < 100; i++) {
                const emptyIndex = board.indexOf(0);
                const moves = getValidMoves(emptyIndex);
                const randomMove = moves[Math.floor(Math.random() * moves.length)];
                [board[emptyIndex], board[randomMove]] = [board[randomMove], board[emptyIndex]];
            }
            moveCount = 0;
            initBoard();
            showMessage('info', '🔀 Đã xáo trộn puzzle. Hãy thử giải!');
            document.getElementById('status').textContent = 'Đang chơi';
            document.getElementById('solutionBox').classList.add('hidden');
        }

        function getValidMoves(emptyIndex) {
            const moves = [];
            const row = Math.floor(emptyIndex / 3);
            const col = emptyIndex % 3;
            
            if (row > 0) moves.push(emptyIndex - 3); // Up
            if (row < 2) moves.push(emptyIndex + 3); // Down
            if (col > 0) moves.push(emptyIndex - 1); // Left
            if (col < 2) moves.push(emptyIndex + 1); // Right
            
            return moves;
        }

        function resetPuzzle() {
            board = [1, 2, 3, 4, 5, 6, 7, 8, 0];
            moveCount = 0;
            initBoard();
            showMessage('info', '🔄 Đã reset về trạng thái ban đầu');
            document.getElementById('status').textContent = 'Sẵn sàng';
            document.getElementById('solutionBox').classList.add('hidden');
        }

        async function solvePuzzle() {
            if (isSolved()) {
                showMessage('info', 'Puzzle đã được giải rồi!');
                return;
            }

            showMessage('info', '🔍 Đang tìm lời giải bằng A*...');
            document.getElementById('status').textContent = 'Đang giải...';
            
            // Simulate solving (simplified version)
            setTimeout(() => {
                const solution = solveWithAStar();
                if (solution) {
                    displaySolution(solution);
                    showMessage('success', `✅ Tìm thấy lời giải với ${solution.length} bước!`);
                    document.getElementById('status').textContent = 'Đã tìm thấy lời giải';
                } else {
                    showMessage('error', '❌ Không tìm thấy lời giải!');
                    document.getElementById('status').textContent = 'Không có lời giải';
                }
            }, 500);
        }

        function solveWithAStar() {
            // A* Algorithm implementation
            const openSet = [];
            const closedSet = new Set();
            const cameFrom = new Map();
            
            const startState = {
                board: [...board],
                g: 0,
                h: calculateManhattanForBoard(board),
                f: 0
            };
            startState.f = startState.g + startState.h;
            openSet.push(startState);
            
            while (openSet.length > 0) {
                // Get state with lowest f score
                openSet.sort((a, b) => a.f - b.f);
                const current = openSet.shift();
                
                // Check if goal reached
                if (isSolvedBoard(current.board)) {
                    return reconstructPath(cameFrom, current.board);
                }
                
                const currentKey = current.board.join(',');
                closedSet.add(currentKey);
                
                // Get neighbors
                const emptyIndex = current.board.indexOf(0);
                const neighbors = getValidMoves(emptyIndex);
                
                for (const moveIndex of neighbors) {
                    const newBoard = [...current.board];
                    [newBoard[emptyIndex], newBoard[moveIndex]] = [newBoard[moveIndex], newBoard[emptyIndex]];
                    
                    const newKey = newBoard.join(',');
                    if (closedSet.has(newKey)) continue;
                    
                    const g = current.g + 1;
                    const h = calculateManhattanForBoard(newBoard);
                    const f = g + h;
                    
                    const existing = openSet.find(s => s.board.join(',') === newKey);
                    if (!existing || g < existing.g) {
                        const newState = { board: newBoard, g, h, f };
                        if (!existing) {
                            openSet.push(newState);
                        } else {
                            existing.g = g;
                            existing.f = f;
                        }
                        cameFrom.set(newKey, { board: current.board, movedTile: newBoard[emptyIndex], direction: getDirection(emptyIndex, moveIndex) });
                    }
                }
                
                // Prevent infinite loop
                if (closedSet.size > 10000) {
                    return null;
                }
            }
            
            return null;
        }
        
        function calculateManhattanForBoard(boardState) {
            let distance = 0;
            for (let i = 0; i < 9; i++) {
                if (boardState[i] !== 0) {
                    const targetIndex = boardState[i] - 1;
                    const currentRow = Math.floor(i / 3);
                    const currentCol = i % 3;
                    const targetRow = Math.floor(targetIndex / 3);
                    const targetCol = targetIndex % 3;
                    distance += Math.abs(currentRow - targetRow) + Math.abs(currentCol - targetCol);
                }
            }
            return distance;
        }
        
        function isSolvedBoard(boardState) {
            return boardState.every((val, idx) => val === goalState[idx]);
        }
        
        function getDirection(fromIndex, toIndex) {
            // Ô trống di chuyển, nhưng hiển thị hướng của ô số di chuyển
            if (toIndex === fromIndex - 3) return 'Xuống';  // Ô trống lên = ô số xuống
            if (toIndex === fromIndex + 3) return 'Lên';     // Ô trống xuống = ô số lên
            if (toIndex === fromIndex - 1) return 'Phải';    // Ô trống trái = ô số phải
            if (toIndex === fromIndex + 1) return 'Trái';    // Ô trống phải = ô số trái
            return '';
        }
        
        function reconstructPath(cameFrom, finalBoard) {
            const path = [];
            let currentKey = finalBoard.join(',');
            
            while (cameFrom.has(currentKey)) {
                const step = cameFrom.get(currentKey);
                path.unshift({ tile: step.movedTile, direction: step.direction });
                currentKey = step.board.join(',');
            }
            
            return path;
        }

        function displaySolution(solution) {
            const solutionBox = document.getElementById('solutionBox');
            solutionBox.innerHTML = '<div class="solution-steps"><h3>📋 Các bước giải:</h3></div>';
            
            const stepsContainer = solutionBox.querySelector('.solution-steps');
            solution.forEach((move, index) => {
                const step = document.createElement('div');
                step.className = 'step';
                step.textContent = `Bước ${index + 1}: Di chuyển ô ${move.tile} ${move.direction}`;
                stepsContainer.appendChild(step);
            });
            
            solutionBox.classList.remove('hidden');
        }

        function showMessage(type, text) {
            const messageBox = document.getElementById('messageBox');
            messageBox.innerHTML = `<div class="message ${type}">${text}</div>`;
            
            setTimeout(() => {
                messageBox.innerHTML = '';
            }, 5000);
        }

        // Initialize
        initBoard();
    </script>
</body>
</html>
